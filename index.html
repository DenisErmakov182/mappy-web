<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Mappy</title>
    <meta name="description" content="Сохраняй интересные места в поездках" />
    <meta name="theme-color" content="#FFFFFF" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mappy" />
    <script>
      (() => {
        let booted = false;
        let recoveryVisible = false;

        const recover = async () => {
          try {
            if ('serviceWorker' in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              await Promise.all(registrations.map((registration) => registration.unregister()));
            }
            if ('caches' in window) {
              const names = await caches.keys();
              await Promise.all(names.map((name) => caches.delete(name)));
            }
          } finally {
            location.replace(`/__mappy_recovery__/${Date.now()}`);
          }
        };

        const showRecovery = (reason) => {
          if (recoveryVisible) return;
          recoveryVisible = true;
          document.body.innerHTML = `
            <main style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;padding:20px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1e2939">
              <div style="max-width:360px">
                <h1 style="margin:0;font-size:28px;line-height:32px;font-weight:600">Не удалось открыть Mappy</h1>
                <p style="margin:16px 0 0;font-size:16px;line-height:22px;color:#4a5565">Обновим оболочку приложения. Аккаунт и сохранённые места останутся на месте.</p>
                <p style="margin:12px 0 0;font-size:12px;line-height:16px;color:#98a2b3">Код запуска: <span id="mappy-boot-reason"></span></p>
              </div>
              <button id="mappy-boot-recovery" style="position:absolute;left:20px;right:20px;bottom:80px;height:56px;border:0;border-radius:14px;background:linear-gradient(180deg,#ff8299 0%,#ff1f55 100%);color:#fff;font-size:16px;font-weight:500">Восстановить приложение</button>
            </main>`;
          const reasonNode = document.getElementById('mappy-boot-reason');
          if (reasonNode) reasonNode.textContent = String(reason);
          document.getElementById('mappy-boot-recovery')?.addEventListener('click', recover);
        };

        window.__MAPPY_MARK_BOOTED__ = () => {
          booted = true;
          clearTimeout(bootTimer);
        };
        window.addEventListener('error', (event) => {
          if (!booted) showRecovery(event.message || 'script_error');
        });
        window.addEventListener('unhandledrejection', () => {
          if (!booted) showRecovery('promise_rejection');
        });
        const bootTimer = setTimeout(() => {
          if (!booted) showRecovery('boot_timeout');
        }, 10000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
